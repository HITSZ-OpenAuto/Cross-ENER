[[courses]]
name = "核能与安全"

[[courses.teachers]]
name = "鞠鹏"

[[courses.teachers.reviews]]
content = """
主要内容是核反应与核安全，老师上课不太清晰，且上课节奏很慢。会以低频次的提问代替考勤，不过也不太看重这个。有两次作业，一次是核反应的小计算，一次是核安全的分析思路。
最后课程报告为核安全事故分析，可以是福岛或者切尔诺贝利或者其他的，汇报无特别具体的要求，三四页word即可。
"""
author = { name = "Gaster", link = "https://github.com/WDGaster703", date = "2026-01" }

